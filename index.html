<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartSlots AI | Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top, #1e293b, #020617);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center text-white font-sans">

  <div class="max-w-4xl w-full px-6">
    <div class="relative overflow-hidden rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl shadow-2xl">

      <!-- Glow -->
      <div class="absolute -top-32 -right-32 h-96 w-96 bg-indigo-500/30 blur-3xl rounded-full"></div>
      <div class="absolute -bottom-32 -left-32 h-96 w-96 bg-cyan-400/20 blur-3xl rounded-full"></div>

      <div class="relative p-10 md:p-16 text-center">
        
        <!-- Logo / Name -->
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight">
          Smart<span class="text-indigo-400">Slots</span><span class="text-cyan-400"> AI</span>
        </h1>

        <!-- Tagline -->
        <p class="mt-4 text-lg md:text-xl text-slate-300">
          AI-Powered Timetable Generator for Colleges & Universities
        </p>

        <!-- Divider -->
        <div class="mx-auto my-8 h-1 w-24 rounded-full bg-gradient-to-r from-indigo-400 to-cyan-400"></div>

        <!-- Value Points -->
        <div class="grid gap-4 md:grid-cols-3 text-sm md:text-base text-slate-200">
          <div class="rounded-xl bg-white/5 p-4 border border-white/10">
            ⚡ Auto-generate clash-free timetables
          </div>
          <div class="rounded-xl bg-white/5 p-4 border border-white/10">
            🤖 AI-optimized faculty & room allocation
          </div>
          <div class="rounded-xl bg-white/5 p-4 border border-white/10">
            ⏱ Save weeks of manual work
          </div>
        </div>

        <!-- CTA -->
        <div class="mt-10">
          <a href="https://forms.gle/your-form-link"
             class="inline-block rounded-2xl bg-gradient-to-r from-indigo-500 to-cyan-500 px-10 py-4 text-lg font-semibold text-white shadow-lg hover:scale-105 transition">
            🚀 Request Early Access
          </a>
        </div>

        <!-- Secondary text -->
        <p class="mt-4 text-slate-400 text-sm">
          Pilot colleges onboarding now
        </p>

        <!-- Footer -->
        <div class="mt-12 border-t border-white/10 pt-6 text-xs text-slate-500">
          © 2026 SmartSlots AI · Built by a Student Founder · India
        </div>

      </div>
    </div>
  </div>

</body>
</html>
