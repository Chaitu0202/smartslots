<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSlots | Page Under Construction</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.2), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.18), transparent 30%),
        linear-gradient(135deg, #020617, #0f172a, #111827);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .float {
      animation: float 4s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(-12px); }
    }

    .glow {
      box-shadow: 0 0 40px rgba(59,130,246,0.4);
    }
  </style>
</head>

<body>

  <div class="glass max-w-2xl w-full rounded-3xl p-8 md:p-12 text-center">

    <!-- Logo / Icon -->
    <div class="text-6xl float mb-6">🚧</div>

    <!-- Heading -->
    <h1 class="text-4xl md:text-5xl font-extrabold mb-4">
      We’re Working On It
    </h1>

    <!-- Subtext -->
    <p class="text-white/80 text-lg mb-6 leading-relaxed">
      Our SmartSlots Hiring Portal is currently under development.<br>
      We’re building something powerful for screening and onboarding.
    </p>

    <!-- Highlight -->
    <div class="bg-blue-500/10 border border-blue-400/20 rounded-xl p-4 mb-6">
      <p class="text-blue-200 font-semibold">
        🚀 Screening registrations & hiring system will be live soon
      </p>
    </div>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center">

      <a href="https://www.smartslots.in/"
         class="px-6 py-3 rounded-xl font-semibold bg-gradient-to-r from-blue-600 to-purple-600 hover:scale-105 transition glow">
        Go to SmartSlots
      </a>

      <button onclick="window.history.back()"
              class="px-6 py-3 rounded-xl font-semibold bg-white/10 border border-white/20 hover:bg-white/20 transition">
        Go Back
      </button>

    </div>

    <!-- Footer -->
    <p class="mt-8 text-sm text-white/50">
      Superposition Solutions Pvt Ltd • SmartSlots
    </p>

  </div>

</body>
</html>
